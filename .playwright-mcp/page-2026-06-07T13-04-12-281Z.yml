          - paragraph [ref=e85]: Portare qualità, efficienza e bellezza nel mondo dei contenuti automotive. Dimostrare che si può fare fotografia e video di altissimo livello senza complicare la vita al cliente. Offrire un'esperienza semplice, diretta ed efficace.
          - generic [ref=e86]:
            - heading "In cosa credo fermamente:" [level=4] [ref=e87]
            - paragraph [ref=e88]: Credo che il valore di un professionista non dipenda solo dall'esperienza, ma dalla sua capacità di adattarsi, migliorare continuamente e mettersi in gioco con l'avvento di tecnologie nuove. Credo inoltre che la vera differenza la faccia chi è disposto a sporcarsi le mani, fallire e ricominciare fino a trovare la giusta strada.
