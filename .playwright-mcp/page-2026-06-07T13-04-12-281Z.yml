            - generic [ref=e32]:
              - paragraph [ref=e33]:
                - text: "Per dieci anni ho lavorato nell'azienda di famiglia, affrontando responsabilità, imprevisti e giornate che iniziavano presto e finivano tardi. È lì che ho imparato una cosa fondamentale:"
                - strong [ref=e34]: non esistono scuse, esistono soluzioni.
              - paragraph [ref=e35]: A 28 anni mi sono fermato e ho deciso di fare di una passione una professione ma fare foto e video belli non bastano. Devono portare risultati.
              - paragraph [ref=e36]:
                - text: Ho unito problem solving, tecnologia e passione per l'automotive creando quello che oggi è
                - strong [ref=e37]: Driven By Light
                - text: ": un sistema visivo orientato alla vendita."
              - paragraph [ref=e38]: Non prometto miracoli. Studio, sperimento, miglioro. Lavoro su metodo, processo e risultati misurabili. Nessuna scorciatoia. Nessuna soluzione standard.
              - paragraph [ref=e39]: "Il mio obiettivo è semplice: aiutare aziende automotive a vendere meglio con un approccio studiato e personalizzato cliente per cliente, necessità per necessità."
