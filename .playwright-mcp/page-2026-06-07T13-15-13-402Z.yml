            - generic [ref=e36]:
              - paragraph [ref=e37]:
                - text: "Per dieci anni ho lavorato nell'azienda di famiglia, affrontando responsabilità, imprevisti e giornate che iniziavano presto e finivano tardi. È lì che ho imparato una cosa fondamentale:"
                - strong [ref=e38]: non esistono scuse, esistono soluzioni.
