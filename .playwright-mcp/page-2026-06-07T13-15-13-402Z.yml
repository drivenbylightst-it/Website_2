              - paragraph [ref=e40]:
                - text: Ho unito problem solving, tecnologia e passione per l'automotive creando quello che oggi è
                - strong [ref=e41]: Driven By Light
                - text: ": un sistema visivo orientato alla vendita."
              - paragraph [ref=e42]: Non prometto miracoli. Studio, sperimento, miglioro. Lavoro su metodo, processo e risultati misurabili. Nessuna scorciatoia. Nessuna soluzione standard.
              - paragraph [ref=e43]: "Il mio obiettivo è semplice: aiutare aziende automotive a vendere meglio con un approccio studiato e personalizzato cliente per cliente, necessità per necessità."
